<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Todo" />
  <meta name="theme-color" content="#0d0d10" />
  <title>Todo</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-day" id="headerDay"></div>
    <div class="header-title">Todo</div>
    <div class="header-right">
      <button class="theme-btn" id="themeBtn" aria-label="Thème"></button>
    </div>
  </header>

  <!-- ── Content ── -->
  <div class="content">

    <!-- LIST VIEW -->
    <section class="view active" id="view-list">

      <!-- Progress -->
      <div class="progress-block">
        <div class="progress-track">
          <div class="progress-fill" id="progFill" style="width:0%"></div>
        </div>
        <div class="progress-meta">
          <div class="progress-left">
            <span id="progLeft">0</span>
            <span>restantes</span>
          </div>
          <div class="progress-pct" id="progPct">0%</div>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">Toutes</button>
        <button class="filter-btn" data-filter="active">À faire</button>
        <button class="filter-btn" data-filter="done">Terminées</button>
      </div>

      <!-- Tasks -->
      <div class="task-list" id="taskList"></div>

      <!-- Empty -->
      <div class="empty" id="empty">
        <div class="empty-icon" id="emptyIcon">✦</div>
        <div class="empty-title" id="emptyTitle">Aucune tâche</div>
        <div class="empty-sub" id="emptySub">Ajoute ta première tâche via "New"</div>
      </div>

    </section>

    <!-- NEW VIEW -->
    <section class="view" id="view-new">

      <div class="form-title">Nouvelle tâche</div>

      <form id="taskForm" novalidate>

        <div class="form-group">
          <label class="form-label" for="fTitle">Titre</label>
          <input
            class="form-input"
            type="text"
            id="fTitle"
            placeholder="Nom de la tâche…"
            maxlength="100"
            autocomplete="off"
            autocorrect="off"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="fDesc">Description</label>
          <textarea
            class="form-textarea"
            id="fDesc"
            placeholder="Détails optionnels…"
            maxlength="300"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="fDate">Date de fin</label>
            <input
              class="form-input"
              type="date"
              id="fDate"
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="fTime">Heure de fin</label>
            <input
              class="form-input"
              type="time"
              id="fTime"
            />
          </div>
        </div>

        <button class="submit-btn" type="submit">Ajouter la tâche</button>

      </form>

    </section>

  </div><!-- /content -->

  <!-- ── Bottom nav ── -->
  <nav class="bottom-nav">
    <button class="nav-btn" data-view="new">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="12" cy="12" r="9"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8"  y1="12" x2="16" y2="12"/>
      </svg>
      New
    </button>
    <button class="nav-btn active" data-view="list">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6"  x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <polyline points="3 6 4 7 6 5"/>
        <polyline points="3 12 4 13 6 11"/>
        <polyline points="3 18 4 19 6 17"/>
      </svg>
      List
    </button>
  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
